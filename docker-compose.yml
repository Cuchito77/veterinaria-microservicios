# ═════════════════════════════════════════════════════
# DOCKER COMPOSE · Veterinaria Microservicios
# Levanta todo el sistema con:  docker compose up --build
#
# Orden de arranque (depends_on + healthchecks):
#   1. mysql          (crea las 4 BD con docker/init-db.sql)
#   2. eureka-server  (registro de servicios)
#   3. ms-login, ms-usuarios, ms-citas, ms-inventario
#   4. api-gateway    (punto unico de entrada: http://localhost:8080)
#
# Las variables de entorno SOBREESCRIBEN application.properties
# (relaxed binding de Spring Boot), por eso no hay que tocar
# la configuracion local: con Laragon todo sigue igual.
# ═════════════════════════════════════════════════════

services:

  # ── BASE DE DATOS ──────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: vet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: vetclave123
    volumes:
      # Script que crea las 4 bases de datos al primer arranque
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      # Volumen para que los datos sobrevivan a un "docker compose down"
      - mysql_data:/var/lib/mysql
    ports:
      # 3307 afuera para NO chocar con el MySQL/MariaDB de Laragon (3306)
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pvetclave123"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── EUREKA SERVER ──────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: vet-eureka
    ports:
      - "8761:8761"
    healthcheck:
      # Chequeo TCP simple: el puerto 8761 ya acepta conexiones
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8761"]
      interval: 5s
      timeout: 5s
      retries: 24

  # ── MS-LOGIN (auth + cuentas, emite el JWT) ────────
  ms-login:
    build: ./ms-login
    container_name: vet-ms-login
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vet_login_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vetclave123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ── MS-USUARIOS (duenos + mascotas) ────────────────
  ms-usuarios:
    build: ./ms-usuarios
    container_name: vet-ms-usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vet_usuarios_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vetclave123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ── MS-INVENTARIO (productos) ──────────────────────
  ms-inventario:
    build: ./ms-inventario
    container_name: vet-ms-inventario
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vet_inventario_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vetclave123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ── MS-CITAS (consume usuarios e inventario) ───────
  ms-citas:
    build: ./ms-citas
    container_name: vet-ms-citas
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vet_citas_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: vetclave123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      # URLs internas de la red de Docker (WebClient)
      MS_USUARIOS_URL: http://ms-usuarios:8081
      MS_INVENTARIO_URL: http://ms-inventario:8083
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      ms-usuarios:
        condition: service_started
      ms-inventario:
        condition: service_started

  # ── API GATEWAY (entrada unica: localhost:8080) ────
  api-gateway:
    build: ./api-gateway
    container_name: vet-api-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy

volumes:
  mysql_data:
