# ═══════════════════════════════════════════════════
# MS-USUARIOS · application.properties
# Microservicio de Usuarios (duenos y mascotas)
# ═══════════════════════════════════════════════════

spring.application.name=ms-usuarios

# ── PUERTO ──────────────────────────────────────────
# Cada microservicio corre en un puerto distinto.
server.port=8081

# ── CONEXION MARIADB (Laragon) ──────────────────────
# Crear la BD vacia "vet_usuarios_db" en Laragon (HeidiSQL
# o el boton "Database"). Flyway creara las tablas.
spring.datasource.url=jdbc:mariadb://localhost:3306/vet_usuarios_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / HIBERNATE ─────────────────────────────────
# validate: Hibernate solo verifica que las entidades
# coincidan con las tablas que creo Flyway. No crea nada.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── FLYWAY ──────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── SWAGGER / OPENAPI ───────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── JWT ─────────────────────────────────────────────
# MISMA clave que ms-login para validar los tokens.
jwt.secret=veterinariaFullStackCL2026claveSecretaJWTsuperSeguraHS256xyz123

# ── EUREKA CLIENT ───────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
