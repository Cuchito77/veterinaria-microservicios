# ═════════════════════════════════════════════════════
# RENDER BLUEPRINT · Despliegue PaaS (Unidad 3)
# Despliega ms-usuarios como Web Service Docker en Render.
#
# La base de datos es un MySQL gratuito de Aiven (Render no
# ofrece base de datos MySQL gratis). Las credenciales se cargan
# como variables de entorno SECRETAS en el dashboard de
# Render (sync: false = Render las pide al crear el servicio,
# nunca quedan en el repositorio).
# ═════════════════════════════════════════════════════

services:
  - type: web
    name: ms-usuarios
    runtime: docker
    # Solo se construye esta carpeta (usa su Dockerfile multi-stage)
    rootDir: ms-usuarios
    plan: free
    # Rama que Render observa para auto-desplegar.
    # TODO: cambiar a "main" cuando se mergee feature/docker.
    branch: feature/docker
    envVars:
      # ── Perfil de Spring: activa el bloque "prod" del application.yml
      #    (puerto por ${PORT}, datasource por variables, sin Eureka) ──
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── Conexion a la BD MySQL de Aiven (secretas) ──
      #    Las usa el perfil prod: ${SPRING_DATASOURCE_URL}, etc.
      - key: SPRING_DATASOURCE_URL
        sync: false   # se ingresa en el dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
