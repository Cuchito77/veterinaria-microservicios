# ═══════════════════════════════════════════════════
# MS-CITAS · application.properties
# ═══════════════════════════════════════════════════

spring.application.name=ms-citas
server.port=8082

# ── CONEXION MARIADB (Laragon) ──────────────────────
# Crear la BD vacia "vet_citas_db" en Laragon.
spring.datasource.url=jdbc:mariadb://localhost:3306/vet_citas_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── URLs DE LOS OTROS MICROSERVICIOS ────────────────
# ms-citas consume estos dos servicios via WebClient.
ms.usuarios.url=http://localhost:8081
ms.inventario.url=http://localhost:8083
