# ═══════════════════════════════════════════════════
# MS-INVENTARIO · application.properties
# ═══════════════════════════════════════════════════

spring.application.name=ms-inventario
server.port=8083

# ── CONEXION MARIADB (Laragon) ──────────────────────
# Crear la BD vacia "vet_inventario_db" en Laragon.
spring.datasource.url=jdbc:mariadb://localhost:3306/vet_inventario_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
