# ═══════════════════════════════════════════════════
# MS-LOGIN · application.properties
# ═══════════════════════════════════════════════════

spring.application.name=ms-login
# Puerto movido a 8084: el 8080 ahora lo usa el API Gateway.
server.port=8084

# ── CONEXION MARIADB (Laragon) ──────────────────────
# Crear la BD vacia "vet_login_db" en Laragon.
spring.datasource.url=jdbc:mariadb://localhost:3306/vet_login_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── SWAGGER / OPENAPI ───────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── JWT ─────────────────────────────────────────────
# La MISMA clave debe estar en los 4 microservicios para
# que el token emitido por ms-login sea validado por todos.
jwt.secret=veterinariaFullStackCL2026claveSecretaJWTsuperSeguraHS256xyz123
jwt.expiration=3600000

# ── EUREKA CLIENT ───────────────────────────────────
# Se registra en el servidor Eureka (puerto 8761).
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
